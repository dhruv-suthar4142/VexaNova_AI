<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VexaNova AI - Vexa Labs Inc.</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9',
                            darkbg: '#131314',
                            sidebar: '#f0f4f9',
                            darksidebar: '#1e1f20',
                            user: '#e3e3e3',
                            darkuser: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Custom Styles & Overrides */
        body {
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: none;
        }
        
        /* Markdown Styles */
        .prose pre {
            background-color: #1e1e1e !important;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose code {
            background-color: rgba(128, 128, 128, 0.2);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        .prose p { margin-bottom: 0.75rem; }
        .prose p:last-child { margin-bottom: 0; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose strong { font-weight: 600; }
        
        /* Textarea auto-resize */
        textarea {
            resize: none;
            overflow-y: auto;
            max-height: 150px;
        }

        /* Hide scrollbar for cleaner look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Typing animation */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-white dark:bg-gemini-darkbg text-gray-800 dark:text-gray-200 h-[100dvh] w-screen overflow-hidden flex font-sans transition-colors duration-200">

    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white dark:bg-gemini-darkbg">
        <svg class="w-12 h-12 text-blue-500 animate-spin mb-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h1 class="text-xl font-semibold tracking-wide">Loading VexaNova AI...</h1>
        <p class="text-sm text-gray-500 mt-2">Vexa Labs Inc.</p>
    </div>

    <!-- App Container -->
    <div id="app" class="hidden flex h-full w-full relative">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity md:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gemini-sidebar dark:bg-gemini-darksidebar transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col border-r border-transparent dark:border-gray-800 h-full">
            <div class="p-4 flex items-center justify-between">
                <button id="new-chat-btn" class="flex items-center gap-3 bg-white dark:bg-[#282a2c] hover:bg-gray-100 dark:hover:bg-gray-700 px-4 py-3 rounded-full shadow-sm text-sm font-medium w-full transition-colors border dark:border-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
                <button id="close-sidebar-btn" class="md:hidden ml-2 p-2 text-gray-500 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1 no-scrollbar">
                <!-- Chat items injected here -->
            </div>

            <div class="p-4 mt-auto border-t border-gray-200 dark:border-gray-800">
                <button id="settings-open-btn" class="flex items-center gap-3 px-3 py-2 w-full text-left rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 h-full relative bg-white dark:bg-gemini-darkbg">
            <!-- Header -->
            <header class="flex items-center justify-between p-3 md:p-4 shrink-0">
                <div class="flex items-center gap-2">
                    <button id="hamburger-btn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 md:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-xl font-medium tracking-tight text-gray-700 dark:text-gray-200 flex items-center gap-2">
                        VexaNova <span class="bg-gradient-to-r from-blue-500 to-purple-500 text-transparent bg-clip-text font-bold">AI</span>
                    </h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-300">
                        <!-- Sun Icon (Hidden in Dark) -->
                        <svg id="icon-sun" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <!-- Moon Icon (Hidden in Light) -->
                        <svg id="icon-moon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-12 lg:px-32 scroll-smooth pb-32">
                <!-- Welcome Screen -->
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-100 transition-opacity">
                    <div class="w-16 h-16 mb-6 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-semibold mb-2">How can I help you today?</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">VexaNova AI is ready to assist you. Powered by OpenRouter.</p>
                </div>
                
                <!-- Messages appended here -->
                <div id="messages-wrapper" class="flex flex-col gap-6 hidden"></div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-darkbg dark:via-gemini-darkbg pt-6 pb-4 px-4 md:px-12 lg:px-32">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative flex items-end shadow-md border border-gray-200 dark:border-gray-700 rounded-3xl bg-white dark:bg-[#1e1f20] overflow-hidden focus-within:ring-1 focus-within:ring-blue-500 transition-shadow">
                        <textarea id="chat-input" rows="1" placeholder="Enter a prompt here..." class="w-full max-h-48 py-3.5 pl-5 pr-14 bg-transparent outline-none resize-none text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 no-scrollbar"></textarea>
                        <button type="submit" id="send-btn" class="absolute right-2 bottom-1.5 p-2 rounded-full text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                    <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                        VexaNova AI may produce inaccurate information about people, places, or facts.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-[#1e1f20] w-full max-w-md rounded-2xl shadow-2xl flex flex-col transform transition-all border dark:border-gray-700">
            <div class="flex justify-between items-center p-5 border-b dark:border-gray-700">
                <h2 class="text-xl font-semibold">Settings</h2>
                <button id="close-settings-btn" class="text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 p-1.5 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-5 overflow-y-auto space-y-5 max-h-[70vh]">
                <!-- API Key -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-v1-..." class="w-full p-2.5 bg-gray-50 dark:bg-black/20 border border-gray-300 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-shadow text-sm">
                </div>
                
                <!-- Model -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Model Name</label>
                    <input type="text" id="setting-model" placeholder="deepseek/deepseek-r1:free" class="w-full p-2.5 bg-gray-50 dark:bg-black/20 border border-gray-300 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-shadow text-sm">
                </div>
                
                <!-- System Prompt -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">System Prompt (Global)</label>
                    <textarea id="setting-system-prompt" rows="3" placeholder="You are a helpful assistant..." class="w-full p-2.5 bg-gray-50 dark:bg-black/20 border border-gray-300 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-shadow text-sm resize-none"></textarea>
                </div>
            </div>
            
            <div class="p-5 border-t dark:border-gray-700 flex justify-end gap-3 bg-gray-50 dark:bg-[#1a1b1c] rounded-b-2xl">
                <button id="cancel-settings-btn" class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">Cancel</button>
                <button id="save-settings-btn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- MAIN APPLICATION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- STATE MANAGEMENT ---
            let state = {
                chats: [],
                currentChatId: null,
                settings: {
                    apiKey: '',
                    model: 'deepseek/deepseek-r1:free',
                    systemPrompt: 'You are VexaNova AI, a highly advanced, helpful, and concise AI assistant built by Vexa Labs Inc.',
                    darkMode: false
                },
                isGenerating: false
            };

            // --- DOM ELEMENTS ---
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                hamburgerBtn: document.getElementById('hamburger-btn'),
                closeSidebarBtn: document.getElementById('closeSidebar-btn'),
                themeToggle: document.getElementById('theme-toggle'),
                htmlTag: document.documentElement,
                newChatBtn: document.getElementById('new-chat-btn'),
                chatList: document.getElementById('chat-list'),
                chatContainer: document.getElementById('chat-container'),
                welcomeScreen: document.getElementById('welcome-screen'),
                messagesWrapper: document.getElementById('messages-wrapper'),
                chatForm: document.getElementById('chat-form'),
                chatInput: document.getElementById('chat-input'),
                sendBtn: document.getElementById('send-btn'),
                // Settings
                settingsModal: document.getElementById('settings-modal'),
                settingsOpenBtn: document.getElementById('settings-open-btn'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                cancelSettingsBtn: document.getElementById('cancel-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                settingApiKey: document.getElementById('setting-api-key'),
                settingModel: document.getElementById('setting-model'),
                settingSystemPrompt: document.getElementById('setting-system-prompt')
            };

            // --- INITIALIZATION ---
            function init() {
                loadState();
                applyTheme();
                setupEventListeners();
                renderChatList();
                
                if (state.chats.length === 0) {
                    createNewChat();
                } else {
                    if (!state.currentChatId) {
                        state.currentChatId = state.chats[0].id;
                    }
                    renderCurrentChat();
                }

                // Remove loading screen
                setTimeout(() => {
                    els.loading.style.display = 'none';
                    els.app.classList.remove('hidden');
                }, 400); // Slight delay for smooth transition
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('vexanova_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        state = { ...state, ...parsed };
                        // Ensure defaults if missing
                        if (!state.settings.model) state.settings.model = 'deepseek/deepseek-r1:free';
                    } else {
                        // Check system preference for dark mode
                        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                            state.settings.darkMode = true;
                        }
                    }
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }

            function saveState() {
                try {
                    localStorage.setItem('vexanova_state', JSON.stringify(state));
                } catch (e) {
                    console.error("Failed to save state", e);
                }
            }

            // --- THEME ---
            function applyTheme() {
                if (state.settings.darkMode) {
                    els.htmlTag.classList.add('dark');
                } else {
                    els.htmlTag.classList.remove('dark');
                }
            }

            function toggleTheme() {
                state.settings.darkMode = !state.settings.darkMode;
                applyTheme();
                saveState();
            }

            // --- SIDEBAR (MOBILE) ---
            function toggleSidebar(forceOpen = null) {
                const isOpen = !els.sidebar.classList.contains('-translate-x-full');
                const shouldOpen = forceOpen !== null ? forceOpen : !isOpen;

                if (shouldOpen) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                } else {
                    els.sidebar.classList.add('-translate-x-full');
                    els.sidebarOverlay.classList.add('hidden');
                }
            }

            // --- CHAT MANAGEMENT ---
            function createNewChat() {
                const newChat = {
                    id: Date.now().toString(),
                    title: 'New Chat',
                    messages: []
                };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
                saveState();
                renderChatList();
                renderCurrentChat();
                toggleSidebar(false);
                els.chatInput.focus();
            }

            function switchChat(id) {
                if (state.isGenerating) return;
                state.currentChatId = id;
                saveState();
                renderChatList();
                renderCurrentChat();
                toggleSidebar(false);
            }

            function deleteChat(id, e) {
                e.stopPropagation();
                if (state.isGenerating) return;
                if (!confirm("Delete this chat?")) return;

                state.chats = state.chats.filter(c => c.id !== id);
                if (state.currentChatId === id) {
                    state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                    if (!state.currentChatId) {
                        createNewChat();
                        return; // createNewChat handles rendering
                    }
                }
                saveState();
                renderChatList();
                renderCurrentChat();
            }

            function renameChat(id, e) {
                e.stopPropagation();
                if (state.isGenerating) return;
                const chat = state.chats.find(c => c.id === id);
                const newTitle = prompt("Enter new title:", chat.title);
                if (newTitle && newTitle.trim()) {
                    chat.title = newTitle.trim();
                    saveState();
                    renderChatList();
                }
            }

            function renderChatList() {
                els.chatList.innerHTML = '';
                state.chats.forEach(chat => {
                    const isActive = chat.id === state.currentChatId;
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between p-2.5 rounded-lg cursor-pointer mb-1 transition-colors ${isActive ? 'bg-blue-100/50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'hover:bg-gray-200/50 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                    item.onclick = () => switchChat(chat.id);
                    
                    const titleWrap = document.createElement('div');
                    titleWrap.className = 'flex items-center gap-3 overflow-hidden flex-1';
                    
                    const icon = document.createElement('div');
                    icon.innerHTML = `<svg class="w-4 h-4 shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>`;
                    
                    const title = document.createElement('span');
                    title.className = 'text-sm font-medium truncate';
                    title.textContent = chat.title;

                    titleWrap.appendChild(icon);
                    titleWrap.appendChild(title);

                    const actions = document.createElement('div');
                    actions.className = `flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}`;
                    
                    const editBtn = document.createElement('button');
                    editBtn.className = 'p-1.5 hover:bg-white dark:hover:bg-gray-700 rounded text-gray-500 transition-colors';
                    editBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`;
                    editBtn.onclick = (e) => renameChat(chat.id, e);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'p-1.5 hover:bg-white dark:hover:bg-gray-700 rounded text-red-500 transition-colors';
                    delBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                    delBtn.onclick = (e) => deleteChat(chat.id, e);

                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    
                    item.appendChild(titleWrap);
                    item.appendChild(actions);
                    els.chatList.appendChild(item);
                });
            }

            function renderCurrentChat() {
                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                els.messagesWrapper.innerHTML = '';
                
                if (!currentChat || currentChat.messages.length === 0) {
                    els.welcomeScreen.classList.remove('hidden');
                    els.messagesWrapper.classList.add('hidden');
                } else {
                    els.welcomeScreen.classList.add('hidden');
                    els.messagesWrapper.classList.remove('hidden');
                    
                    currentChat.messages.forEach(msg => {
                        appendMessageToDOM(msg.role, msg.content, false);
                    });
                    scrollToBottom();
                }
            }

            // --- MESSAGE RENDERING ---
            function createMessageElement(role, content) {
                const wrapper = document.createElement('div');
                wrapper.className = `flex gap-4 w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;

                const contentDiv = document.createElement('div');
                
                if (role === 'user') {
                    contentDiv.className = 'max-w-[85%] bg-gemini-user dark:bg-gemini-darkuser text-gray-800 dark:text-gray-100 rounded-2xl rounded-tr-sm px-5 py-3.5 prose dark:prose-invert break-words shadow-sm';
                    contentDiv.textContent = content; // Safe text
                } else {
                    wrapper.className = 'flex gap-4 w-full justify-start';
                    
                    // AI Avatar
                    const avatar = document.createElement('div');
                    avatar.className = 'w-8 h-8 shrink-0 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mt-1 shadow-sm';
                    avatar.innerHTML = `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
                    
                    contentDiv.className = 'max-w-[85%] prose dark:prose-invert text-gray-800 dark:text-gray-100 break-words leading-relaxed py-1';
                    
                    if (content === null) {
                        // Loading state
                        contentDiv.innerHTML = `
                            <div class="flex items-center h-6 gap-1">
                                <div class="w-2 h-2 rounded-full bg-blue-500 typing-dot"></div>
                                <div class="w-2 h-2 rounded-full bg-blue-500 typing-dot"></div>
                                <div class="w-2 h-2 rounded-full bg-blue-500 typing-dot"></div>
                            </div>
                        `;
                    } else {
                        try {
                            contentDiv.innerHTML = marked.parse(content);
                        } catch(e) {
                            contentDiv.textContent = content;
                        }
                    }

                    wrapper.appendChild(avatar);
                }
                
                wrapper.appendChild(contentDiv);
                return wrapper;
            }

            function appendMessageToDOM(role, content, animate = false) {
                const el = createMessageElement(role, content);
                els.messagesWrapper.appendChild(el);
                if(animate) {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(10px)';
                    requestAnimationFrame(() => {
                        el.style.transition = 'all 0.3s ease';
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    });
                }
                return el.querySelector('.prose'); // return content div
            }

            function scrollToBottom() {
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
            }

            // --- API COMMUNICATION ---
            async function handleSubmit(e) {
                if (e) e.preventDefault();
                
                if (state.isGenerating) return;
                
                const prompt = els.chatInput.value.trim();
                if (!prompt) return;

                if (!state.settings.apiKey) {
                    alert('Please set your OpenRouter API Key in settings first.');
                    openSettings();
                    return;
                }

                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                if (!currentChat) return;

                // Auto-generate title for new chat
                if (currentChat.messages.length === 0) {
                    currentChat.title = prompt.substring(0, 30) + (prompt.length > 30 ? '...' : '');
                    renderChatList();
                }

                // Add user message
                currentChat.messages.push({ role: 'user', content: prompt });
                saveState();
                
                els.chatInput.value = '';
                adjustTextareaHeight();
                
                els.welcomeScreen.classList.add('hidden');
                els.messagesWrapper.classList.remove('hidden');
                
                appendMessageToDOM('user', prompt, true);
                scrollToBottom();

                // Prepare API Call
                const systemMessage = state.settings.systemPrompt ? [{ role: 'system', content: state.settings.systemPrompt }] : [];
                const apiMessages = [...systemMessage, ...currentChat.messages.map(m => ({ role: m.role, content: m.content }))];

                state.isGenerating = true;
                els.sendBtn.disabled = true;
                els.chatInput.disabled = true;

                // Append loading placeholder
                const aiContentDiv = appendMessageToDOM('assistant', null, true);
                scrollToBottom();

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.settings.apiKey}`
                        },
                        body: JSON.stringify({
                            model: state.settings.model || 'deepseek/deepseek-r1:free',
                            messages: apiMessages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API Error: ${response.status} - ${errText}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let done = false;
                    let fullText = '';
                    let buffer = '';

                    // Clear loading dots
                    aiContentDiv.innerHTML = '';

                    while (!done) {
                        const { value, done: readerDone } = await reader.read();
                        done = readerDone;
                        if (value) {
                            buffer += decoder.decode(value, { stream: true });
                            let lines = buffer.split('\n');
                            buffer = lines.pop(); // Keep last incomplete line

                            for (let line of lines) {
                                line = line.trim();
                                if (line === 'data: [DONE]') continue;
                                if (line.startsWith('data: ')) {
                                    try {
                                        const parsed = JSON.parse(line.slice(5));
                                        if (parsed.choices && parsed.choices[0].delta && parsed.choices[0].delta.content) {
                                            fullText += parsed.choices[0].delta.content;
                                            aiContentDiv.innerHTML = marked.parse(fullText);
                                            // Smooth scroll only if near bottom
                                            const isNearBottom = els.chatContainer.scrollHeight - els.chatContainer.scrollTop - els.chatContainer.clientHeight < 150;
                                            if (isNearBottom) scrollToBottom();
                                        }
                                    } catch (err) {
                                        // Ignore parse errors on incomplete chunks
                                    }
                                }
                            }
                        }
                    }

                    // Save message
                    currentChat.messages.push({ role: 'assistant', content: fullText });
                    saveState();

                } catch (error) {
                    console.error(error);
                    aiContentDiv.innerHTML = `<div class="text-red-500 font-medium py-2">Error: ${error.message}</div>`;
                } finally {
                    state.isGenerating = false;
                    els.sendBtn.disabled = false;
                    els.chatInput.disabled = false;
                    els.chatInput.focus();
                    scrollToBottom();
                }
            }

            // --- UTILS & LISTENERS ---
            function adjustTextareaHeight() {
                els.chatInput.style.height = 'auto';
                els.chatInput.style.height = (els.chatInput.scrollHeight) + 'px';
                if(els.chatInput.value === '') {
                    els.chatInput.style.height = 'auto'; // Reset
                }
            }

            function openSettings() {
                els.settingApiKey.value = state.settings.apiKey;
                els.settingModel.value = state.settings.model;
                els.settingSystemPrompt.value = state.settings.systemPrompt;
                els.settingsModal.classList.remove('hidden');
                toggleSidebar(false);
            }

            function closeSettings() {
                els.settingsModal.classList.add('hidden');
            }

            function saveSettings() {
                state.settings.apiKey = els.settingApiKey.value.trim();
                state.settings.model = els.settingModel.value.trim() || 'deepseek/deepseek-r1:free';
                state.settings.systemPrompt = els.settingSystemPrompt.value.trim();
                saveState();
                closeSettings();
            }

            function setupEventListeners() {
                // Sidebar
                els.hamburgerBtn.addEventListener('click', () => toggleSidebar(true));
                if (els.closeSidebarBtn) els.closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
                els.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
                
                // Theme
                els.themeToggle.addEventListener('click', toggleTheme);
                
                // Chats
                els.newChatBtn.addEventListener('click', createNewChat);
                
                // Chat Input
                els.chatInput.addEventListener('input', adjustTextareaHeight);
                els.chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSubmit();
                    }
                });
                els.chatForm.addEventListener('submit', handleSubmit);
                
                // Settings
                els.settingsOpenBtn.addEventListener('click', openSettings);
                els.closeSettingsBtn.addEventListener('click', closeSettings);
                els.cancelSettingsBtn.addEventListener('click', closeSettings);
                els.saveSettingsBtn.addEventListener('click', saveSettings);
            }

            // Boot
            init();
        });
    </script>
</body>
</html>
